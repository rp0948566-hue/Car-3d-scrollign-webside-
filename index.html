<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bugatti Tourbillon | Luxury Experience</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400..900;1,6..96,400..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">

<body>
    <div id="loader">
        <div class="loader-content">
            <h1>BUGATTI</h1>
            <p>LOADING PERFECTION...</p>
        </div>
    </div>

    <div id="canvas-container"></div>

    <div id="ui-layer">
        <div id="brand-top" class="hero-text">
            <h1>BUGATTI</h1>
        </div>

        <div id="stats-center" class="hero-stats">
            <p>1,600 HP | 300 KM/H</p>
        </div>

        <div id="brand-bottom" class="hero-text">
            <h1>TOURBILLON</h1>
        </div>

        <div id="side-tag" class="hero-stats">
            <p>PRECISION ENGINEERING</p>
        </div>

        <div id="speedometer-container">
            <div class="speed-value">0</div>
            <div class="speed-label">KM/H</div>
            <div class="speed-bar">
                <div id="speed-progress"></div>
            </div>
        </div>
    </div>

    <div id="scroll-wrapper">
        <!-- 50 sections for smooth scrollytelling -->
