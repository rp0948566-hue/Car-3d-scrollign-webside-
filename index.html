<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REDEFINED | Car 3D Experience</title>
    <meta name="description" content="A premium 3D car showcase experience built with Three.js and GSAP.">
    <link rel="stylesheet" href="/src/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,300;1,600&family=Inter:wght@100;400;700&display=swap"
        rel="stylesheet">

</head>

<body>
    <div id="app">
        <nav class="glass-nav">
            <div class="logo">REDEFINED</div>
            <ul class="nav-links">
                <li><a href="#hero">Genesis</a></li>
                <li><a href="#specs">Technical</a></li>
                <li><a href="#gallery">Gallery</a></li>
            </ul>
        </nav>
        <!-- Canvas for Three.js -->

        <canvas id="webgl"></canvas>

        <!-- UI Overlay -->
        <main id="content">
            <section id="hero">
                <div class="hero-content">
                    <span class="sub-title">ENGINEERED ELEGANCE</span>
                    <h1>THE NEW PERFECTION</h1>
                    <p>A symphony of carbon, glass, and speed. Designed for those who demand more than just mobility.
                    </p>
                    <div class="hero-ctas">
                        <button class="btn btn-primary">RESERVE NOW</button>
                        <button class="btn btn-outline">EXPLORE SPECS</button>
                    </div>
                </div>
            </section>

            <section id="specs">
                <div class="specs-grid">
                    <div class="spec-item">
                        <span class="spec-label">POWER</span>
                        <span class="spec-value">1600 HP</span>
                    </div>
                    <div class="spec-item">
                        <span class="spec-label">0-100 KM/H</span>
                        <span class="spec-value">2.4 SEC</span>
                    </div>
                    <div class="spec-item">
                        <span class="spec-label">TOP SPEED</span>
                        <span class="spec-value">420 KM/H</span>
                    </div>
                    <div class="spec-item">
                        <span class="spec-label">ENGINE</span>
                        <span class="spec-value">W16 QUAD-TURBO</span>
                    </div>
                </div>
            </section>

    </div>

    <script type="module" src="/src/js/main.js"></script>
</body>

</html>
